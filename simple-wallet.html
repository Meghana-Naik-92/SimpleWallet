<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Wallet</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: rgba(12, 12, 22, 0.68);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f0;
      --muted: #7a7a8a;
      --accent: #c8f060;
      --danger: #ff6b6b;
      --radius: 16px;
      --transition: 200ms cubic-bezier(.4, 0, .2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 0 24px 7vw;
      position: relative;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: 72% center;
      z-index: 0;
      transform: scale(1.06);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to right,
          rgba(4, 4, 14, 0.92) 0%,
          rgba(4, 4, 14, 0.78) 28%,
          rgba(4, 4, 14, 0.42) 50%,
          rgba(4, 4, 14, 0.10) 72%,
          rgba(4, 4, 14, 0.02) 100%);
      z-index: 1;
    }

    .bg-overlay::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(4, 4, 14, 0.55) 0%, transparent 18%,
          transparent 82%, rgba(4, 4, 14, 0.55) 100%);
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      padding: 34px 30px 30px;
      position: relative;
      z-index: 10;
      backdrop-filter: blur(28px) saturate(1.5) brightness(1.05);
      -webkit-backdrop-filter: blur(28px) saturate(1.5) brightness(1.05);
      box-shadow:
        0 0 0 1px rgba(200, 240, 96, 0.07),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 40px 80px rgba(0, 0, 0, 0.4),
        8px 0 60px rgba(200, 130, 30, 0.08),
        inset 1px 0 0 rgba(255, 255, 255, 0.04);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 16%;
      right: 16%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      opacity: .8;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 10%;
      bottom: 10%;
      right: -1px;
      width: 1px;
      background: linear-gradient(to bottom,
          transparent, rgba(220, 150, 40, 0.25),
          rgba(220, 150, 40, 0.12), transparent);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    #connectBtn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: #0a0a0f;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #connectBtn:hover {
      opacity: .88;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(200, 240, 96, 0.32);
    }

    #connectBtn:active {
      transform: translateY(0);
    }

    #connectBtn.connected {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, 0.22);
      font-size: 10px;
    }

    .balance-tile {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      margin-bottom: 22px;
    }

    .balance-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .balance-value {
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .balance-value span {
      font-size: 13px;
      color: var(--muted);
      margin-left: 5px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 18px;
    }

    .action-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 9px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .input-row input {
      flex: 1;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 13px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .input-row input::placeholder {
      color: var(--muted);
    }

    .input-row input:focus {
      border-color: rgba(200, 240, 96, 0.38);
      background: rgba(200, 240, 96, 0.025);
    }

    .action-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      border: none;
      border-radius: 9px;
      padding: 10px 17px;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .action-btn:hover {
      opacity: .82;
      transform: translateY(-1px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn:disabled {
      opacity: .28;
      cursor: not-allowed;
      transform: none;
    }

    .btn-deposit {
      background: var(--accent);
      color: #0a0a0f;
      box-shadow: 0 2px 12px rgba(200, 240, 96, 0.18);
    }

    .btn-deposit:hover {
      box-shadow: 0 4px 22px rgba(200, 240, 96, 0.35);
    }

    .btn-withdraw {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.28);
    }

    .btn-withdraw:hover {
      background: rgba(255, 107, 107, 0.05);
    }

    #withdrawSection {
      display: none;
    }

    #status {
      margin-top: 18px;
      padding: 11px 13px;
      border-radius: 9px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .04em;
      display: none;
      word-break: break-all;
      line-height: 1.6;
    }

    #status.info {
      background: rgba(200, 240, 96, .07);
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, .18);
    }

    #status.success {
      background: rgba(200, 240, 96, .11);
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, .28);
    }

    #status.error {
      background: rgba(255, 107, 107, .07);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, .2);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 7px;
      vertical-align: middle;
    }

    .net-badge {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      margin-top: 16px;
    }

    .net-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--accent);
    }

    @media(max-width:680px) {
      body {
        justify-content: center;
        padding: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-image" id="bgImg"></div>
  <div class="bg-overlay"></div>
  <div class="card">
    <header>
      <span class="logo">⬡ SimpleWallet</span>
      <button id="connectBtn">Connect Wallet</button>
    </header>
    <div class="balance-tile">
      <div class="balance-label">Contract Balance</div>
      <div class="balance-value" id="balanceDisplay">—<span>ETH</span></div>
    </div>
    <div class="divider"></div>
    <div class="action-label">Deposit</div>
    <div class="input-row">
      <input id="depositAmount" type="number" min="0" step="any" placeholder="0.00 ETH" />
      <button class="action-btn btn-deposit" id="depositBtn" disabled>Send</button>
    </div>
    <div id="withdrawSection">
      <div class="action-label">Withdraw <span style="color:var(--accent)">(owner)</span></div>
      <div class="input-row">
        <input id="withdrawAmount" type="number" min="0" step="any" placeholder="0.00 ETH" />
        <button class="action-btn btn-withdraw" id="withdrawBtn">Pull</button>
      </div>
    </div>
    <div id="status"></div>
    <div class="net-badge"><span class="net-dot"></span>Sepolia Testnet</div>
  </div>

    const CONTRACT_ADDRESS = "0x493a84F1EB5798db3970e3dd37A180ACeCb52764";
    const CONTRACT_ABI = [
	{
		"inputs": [],
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "sender",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "Deposited",
		"type": "event"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "Withdrawn",
		"type": "event"
	},
	{
		"inputs": [],
		"name": "deposit",
		"outputs": [],
		"stateMutability": "payable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getBalance",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "uint256",
				"name": "_amount",
				"type": "uint256"
			}
		],
		"name": "withdraw",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];
    // Paste your ABI array above ^^^

    let provider, signer, contract, userAddress;
    const connectBtn = document.getElementById('connectBtn');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const depositBtn = document.getElementById('depositBtn');
    const withdrawBtn = document.getElementById('withdrawBtn');
    const depositAmount = document.getElementById('depositAmount');
    const withdrawAmount = document.getElementById('withdrawAmount');
    const withdrawSection = document.getElementById('withdrawSection');
    const statusEl = document.getElementById('status');

    function showStatus(msg, type = 'info', spin = false) {
      statusEl.innerHTML = (spin ? '<span class="spinner"></span>' : '') + msg;
      statusEl.className = type; statusEl.style.display = 'block';
    }
    function clearStatus() { statusEl.style.display = 'none'; statusEl.className = ''; }
    function short(a) { return a.slice(0, 6) + '…' + a.slice(-4); }

    connectBtn.addEventListener('click', async () => {
      if (!window.ethereum) { showStatus('MetaMask not detected.', 'error'); return; }
      try {
        showStatus('Connecting…', 'info', true);
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        connectBtn.textContent = short(userAddress);
        connectBtn.classList.add('connected');
        depositBtn.disabled = false;
        clearStatus();
        await refreshBalance(); await checkOwner();
        provider.on('block', refreshBalance);
      } catch (err) { showStatus(err.message || 'Connection failed.', 'error'); }
    });

    async function refreshBalance() {
      try {
        let bal;
        try { bal = await contract.getBalance(); }
        catch { bal = await provider.getBalance(CONTRACT_ADDRESS); }
        balanceDisplay.innerHTML = parseFloat(ethers.formatEther(bal)).toFixed(4) + '<span>ETH</span>';
      } catch { }
    }
    async function checkOwner() {
      try {
        const owner = await contract.owner();
        if (owner.toLowerCase() === userAddress.toLowerCase())
          withdrawSection.style.display = 'block';
      } catch { }
    }
    depositBtn.addEventListener('click', async () => {
      const val = depositAmount.value.trim();
      if (!val || isNaN(val) || Number(val) <= 0) { showStatus('Enter a valid ETH amount.', 'error'); return; }
      try {
        showStatus('Waiting for signature…', 'info', true);
        const tx = await contract.deposit({ value: ethers.parseEther(val) });
        showStatus('Transaction sent. Confirming…', 'info', true);
        await tx.wait(); depositAmount.value = '';
        await refreshBalance();
        showStatus('Deposited ' + val + ' ETH ✓', 'success');
      } catch (err) { showStatus(err?.reason || err.message || 'Deposit failed.', 'error'); }
    });
    withdrawBtn.addEventListener('click', async () => {
      const val = withdrawAmount.value.trim();
      if (!val || isNaN(val) || Number(val) <= 0) { showStatus('Enter a valid ETH amount.', 'error'); return; }
      try {
        showStatus('Waiting for signature…', 'info', true);
        const tx = await contract.withdraw(ethers.parseEther(val));
        showStatus('Transaction sent. Confirming…', 'info', true);
        await tx.wait(); withdrawAmount.value = '';
        await refreshBalance();
        showStatus('Withdrew ' + val + ' ETH ✓', 'success');
      } catch (err) { showStatus(err?.reason || err.message || 'Withdrawal failed.', 'error'); }
    });
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', () => location.reload());
      window.ethereum.on('chainChanged', () => location.reload());
    }
  </script>
